<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias Laboratorios Mar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #ffffff; }

    #carousel-area {
      position: relative;
      overflow: hidden;
      background: #1a2a4a;
    }
    #carousel-track {
      display: flex;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    }
    .nm-slide {
      min-width: 100%;
      position: relative;
      height: 280px;
      text-decoration: none;
      display: block;
      flex-shrink: 0;
    }
    .nm-slide img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .nm-img-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a2a4a, #2c3e6b);
    }
    .nm-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(5,15,40,0.92));
      padding: 40px 18px 16px;
    }
    .nm-source {
      font-size: 10px; color: #e63946;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 5px;
    }
    .nm-title {
      font-size: 15px; font-weight: 700;
      color: #ffffff; line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .nm-counter {
      position: absolute; top: 10px; right: 12px;
      background: rgba(5,15,40,0.65);
      color: #fff; font-size: 10px;
      padding: 2px 8px; border-radius: 10px; z-index: 10;
    }
    .nm-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(5,15,40,0.5);
      border: none; color: #fff;
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 22px; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .nm-btn:hover { background: rgba(5,15,40,0.85); }
    #prev-btn { left: 10px; }
    #next-btn { right: 10px; }

    #progress-bar { height: 3px; background: #1a2a4a; }
    #progress-fill { height: 100%; background: #e63946; width: 0%; }

    #grid-section { border-top: 2px solid #e63946; }

    #grid-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; background: #f4f4f4;
      border-bottom: 1px solid #ddd;
    }
    #grid-nav-info {
      font-size: 10px; color: #888; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    #grid-nav-btns { display: flex; gap: 6px; }
    .grid-nav-btn {
      background: #1a2a4a; border: none; color: #fff;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .grid-nav-btn:hover { background: #e63946; }
    .grid-nav-btn:disabled { background: #ccc; cursor: default; }

    #news-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: #ddd;
    }
    .nm-card {
      background: #fff; padding: 10px 13px;
      text-decoration: none; display: block;
    }
    .nm-card:hover .nm-card-title { color: #e63946; }
    .nm-card-source {
      font-size: 9px; color: #e63946; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px;
    }
    .nm-card-title {
      font-size: 11px; color: #222; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
      transition: color 0.2s;
    }

    #main-loading {
      height: 280px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: #8899bb; font-size: 13px;
    }
    #loading-detail {
      font-size: 10px; color: #4a6a9a;
    }
  </style>
</head>
<body>

<div id="carousel-area">
  <div id="main-loading">
    <span>Cargando noticias...</span>
    <span id="loading-detail"></span>
  </div>
  <div id="carousel-track" style="display:none;"></div>
  <span class="nm-counter" id="counter" style="display:none;"></span>
  <button class="nm-btn" id="prev-btn" style="display:none;">&#8249;</button>
  <button class="nm-btn" id="next-btn" style="display:none;">&#8250;</button>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="grid-section">
  <div id="grid-nav">
    <span id="grid-nav-info">Más noticias</span>
    <div id="grid-nav-btns">
      <button class="grid-nav-btn" id="grid-prev" title="Anterior">&#8249;</button>
      <button class="grid-nav-btn" id="grid-next" title="Siguiente">&#8250;</button>
    </div>
  </div>
  <div id="news-grid"></div>
</div>

<script>
/* ─────────────────────────────────────────
   CONFIGURACIÓN
───────────────────────────────────────── */
const FEEDS = [
  { url: "https://feeds.bbci.co.uk/mundo/rss.xml",             name: "BBC Mundo"    },
  { url: "https://www.lanacion.com.ar/arc/outboundfeeds/rss/", name: "La Nación"    },
  { url: "https://www.clarin.com/rss/lo-ultimo/",              name: "Clarín"       },
  { url: "https://www.america-retail.com/feed/",               name: "América Retail"},
  { url: "https://www.lavanguardia.com/rss/salud.xml",         name: "La Vanguardia"},
  { url: "https://www.20minutos.es/rss/salud/",                name: "20 Minutos"   },
];

const AUTO_INTERVAL = 5000;

/* ─────────────────────────────────────────
   PROXIES en orden de preferencia
   Cada función recibe la URL del feed
   y devuelve una Promise con array de items
   o lanza error si falla.
───────────────────────────────────────── */

// Proxy 1: rss2json (más popular, puede tener rate limit)
async function viaRss2json(feedUrl) {
  const api = "https://api.rss2json.com/v1/api.json?count=50&rss_url=" + encodeURIComponent(feedUrl);
  const r = await fetch(api);
  const d = await r.json();
  if (d.status !== "ok" || !d.items?.length) throw new Error("rss2json: no items");
  return d.items.map(i => ({
    title:       i.title       || "",
    link:        i.link        || "",
    description: i.description || "",
    thumbnail:   i.thumbnail   || "",
    enclosure:   i.enclosure   || null,
  }));
}

// Proxy 2: allorigins → XML crudo → parser propio
async function viaAllOrigins(feedUrl) {
  const api = "https://api.allorigins.win/get?url=" + encodeURIComponent(feedUrl);
  const r = await fetch(api);
  const d = await r.json();
  if (!d.contents) throw new Error("allorigins: sin contenido");
  return parseRSS(d.contents);
}

// Proxy 3: corsproxy.io → XML crudo → parser propio
async function viaCorsProxy(feedUrl) {
  const api = "https://corsproxy.io/?" + encodeURIComponent(feedUrl);
  const r = await fetch(api);
  const text = await r.text();
  return parseRSS(text);
}

// Parser XML manual (funciona con RSS 2.0 y Atom básico)
function parseRSS(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  const items = [...doc.querySelectorAll("item, entry")];
  return items.map(el => {
    const get = tag => el.querySelector(tag)?.textContent?.trim() || "";
    const enc = el.querySelector("enclosure");
    const med = el.querySelector("thumbnail") || el.querySelector("content");
    return {
      title:       get("title"),
      link:        get("link") || el.querySelector("link")?.getAttribute("href") || "",
      description: get("description") || get("summary"),
      thumbnail:   med?.getAttribute("url") || "",
      enclosure:   enc ? { link: enc.getAttribute("url") || "" } : null,
    };
  }).filter(i => i.title && i.link);
}

/* ─────────────────────────────────────────
   CARGA UN FEED intentando cada proxy
───────────────────────────────────────── */
async function loadFeed(feed) {
  const proxies = [viaRss2json, viaAllOrigins, viaCorsProxy];
  for (const proxy of proxies) {
    try {
      const items = await proxy(feed.url);
      if (items.length) return items.map(i => ({ ...i, _name: feed.name }));
    } catch (_) {}
  }
  return []; // feed no disponible, continuar con los demás
}

/* ─────────────────────────────────────────
   EXTRAE IMAGEN del item
───────────────────────────────────────── */
function getImage(item) {
  if (item.thumbnail && /^https?:/.test(item.thumbnail)) return item.thumbnail;
  if (item.enclosure?.link && /^https?:/.test(item.enclosure.link)) return item.enclosure.link;
  const m = (item.description || "").match(/src=["']([^"']+\.(jpe?g|png|webp)[^"']*)/i);
  return m ? m[1] : null;
}

/* ─────────────────────────────────────────
   ESTADO GLOBAL
───────────────────────────────────────── */
let allItems = [], current = 0, total = 0, timer = null;
const GRID_PER_PAGE = 8;
let gridPage = 0;

function renderGridPage(page) {
  gridPage = page;
  const totalPages = Math.ceil(allItems.length / GRID_PER_PAGE);
  const start = page * GRID_PER_PAGE;
  const pageItems = allItems.slice(start, start + GRID_PER_PAGE);

  const grid = document.getElementById("news-grid");
  grid.innerHTML = "";
  pageItems.forEach(function(item) {
    const a = document.createElement("a");
    a.className = "nm-card";
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML =
      '<div class="nm-card-source">' + item._name + '</div>' +
      '<div class="nm-card-title">' + item.title + '</div>';
    grid.appendChild(a);
  });

  document.getElementById("grid-nav-info").textContent =
    "Página " + (page + 1) + " de " + totalPages + " — " + allItems.length + " noticias";
  document.getElementById("grid-prev").disabled = (page === 0);
  document.getElementById("grid-next").disabled = (page >= totalPages - 1);
}

document.getElementById("grid-prev").addEventListener("click", function() {
  if (gridPage > 0) renderGridPage(gridPage - 1);
});
document.getElementById("grid-next").addEventListener("click", function() {
  const totalPages = Math.ceil(allItems.length / GRID_PER_PAGE);
  if (gridPage < totalPages - 1) renderGridPage(gridPage + 1);
});

/* ─────────────────────────────────────────
   CARGA TODOS LOS FEEDS
───────────────────────────────────────── */
async function loadAll() {
  document.getElementById("loading-detail").textContent = "(consultando " + FEEDS.length + " fuentes...)";

  // cargar en paralelo
  const results = await Promise.all(FEEDS.map(loadFeed));
  let merged = [];
  results.forEach(r => { merged = merged.concat(r); });

  // mezclar
  for (let i = merged.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [merged[i], merged[j]] = [merged[j], merged[i]];
  }

  allItems = merged;

  if (!allItems.length) {
    document.getElementById("loading-detail").textContent = "No se pudieron cargar las fuentes. Reintentando en 2 min...";
    return;
  }

  render();
}

/* ─────────────────────────────────────────
   RENDER
───────────────────────────────────────── */
function render() {
  total = allItems.length;

  // ── Carrusel ──
  const track = document.getElementById("carousel-track");
  track.innerHTML = "";

  allItems.forEach(item => {
    const img = getImage(item);
    const a = document.createElement("a");
    a.className = "nm-slide";
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    const imgHtml = img
      ? '<img src="' + img + '" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=nm-img-placeholder></div>\'">'
      : '<div class="nm-img-placeholder"></div>';

    a.innerHTML = imgHtml +
      '<div class="nm-overlay">' +
        '<div class="nm-source">' + item._name + '</div>' +
        '<div class="nm-title">' + item.title + '</div>' +
      '</div>';
    track.appendChild(a);
  });

  document.getElementById("main-loading").style.display = "none";
  track.style.display = "flex";
  document.getElementById("prev-btn").style.display = "flex";
  document.getElementById("next-btn").style.display = "flex";
  document.getElementById("counter").style.display = "block";

  goTo(0);
  startAuto();

  // ── Grid paginado ──
  renderGridPage(0);
}

/* ─────────────────────────────────────────
   NAVEGACIÓN
───────────────────────────────────────── */
function goTo(idx) {
  current = (idx + total) % total;
  document.getElementById("carousel-track").style.transform = "translateX(" + (-current * 100) + "%)";
  document.getElementById("counter").textContent = (current + 1) + " / " + total;
  var fill = document.getElementById("progress-fill");
  fill.style.transition = "none";
  fill.style.width = "0%";
  requestAnimationFrame(function() {
    fill.style.transition = "width " + AUTO_INTERVAL + "ms linear";
    fill.style.width = "100%";
  });
}

function startAuto() {
  clearInterval(timer);
  timer = setInterval(function() { goTo(current + 1); }, AUTO_INTERVAL);
}

document.getElementById("prev-btn").addEventListener("click", function() { goTo(current - 1); startAuto(); });
document.getElementById("next-btn").addEventListener("click", function() { goTo(current + 1); startAuto(); });
document.getElementById("carousel-area").addEventListener("mouseenter", function() { clearInterval(timer); });
document.getElementById("carousel-area").addEventListener("mouseleave", function() { startAuto(); });

/* ─────────────────────────────────────────
   INICIO
───────────────────────────────────────── */
loadAll();
setInterval(loadAll, 10 * 60 * 1000);
</script>

</body>
</html>
