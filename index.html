<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias Laboratorios Mar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #ffffff; }

    /* Contenedor al 50% */
    #notimar-root {
      width: 50%;
      min-width: 280px;
    }

    /* === CARRUSEL === */
    #carousel-area {
      position: relative;
      overflow: hidden;
      background: #1a2a4a;
    }
    #carousel-track {
      display: flex;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    }
    .nm-slide {
      min-width: 100%;
      position: relative;
      height: 240px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      flex-shrink: 0;
    }
    .nm-slide img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .nm-img-placeholder {
      width: 100%; height: 100%;
      background: #1a2a4a;
    }
    .nm-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(10,20,50,0.88));
      padding: 36px 14px 14px;
    }
    .nm-source {
      font-size: 9px;
      color: #e63946;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .nm-title {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .nm-counter {
      position: absolute;
      top: 8px; right: 10px;
      background: rgba(10,20,50,0.65);
      color: #fff;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      z-index: 10;
    }
    .nm-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(10,20,50,0.55);
      border: none; color: #fff;
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .nm-btn:hover { background: rgba(10,20,50,0.85); }
    #prev-btn { left: 8px; }
    #next-btn { right: 8px; }

    #progress-bar { height: 3px; background: #1a2a4a; }
    #progress-fill { height: 100%; background: #e63946; width: 0%; }

    /* === GRID === */
    #grid-section { border-top: 2px solid #e63946; }
    #news-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: #ddd;
    }
    .nm-card {
      background: #fff;
      padding: 9px 11px;
      text-decoration: none;
      display: block;
    }
    .nm-card:hover .nm-card-title { color: #e63946; }
    .nm-card-source {
      font-size: 9px;
      color: #e63946;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 3px;
    }
    .nm-card-title {
      font-size: 11px;
      color: #222;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.2s;
    }

    #main-loading {
      height: 240px;
      display: flex; align-items: center; justify-content: center;
      color: #8899bb; font-size: 12px;
    }
  </style>
</head>
<body>

<div id="notimar-root">

  <div id="carousel-area">
    <div id="main-loading">Cargando noticias...</div>
    <div id="carousel-track" style="display:none;"></div>
    <span class="nm-counter" id="counter" style="display:none;"></span>
    <button class="nm-btn" id="prev-btn" style="display:none;">&#8249;</button>
    <button class="nm-btn" id="next-btn" style="display:none;">&#8250;</button>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="grid-section">
    <div id="news-grid"></div>
  </div>

</div>

<script>
const RSS_URLS = [
  "https://feeds.bbci.co.uk/mundo/rss.xml",
  "https://www.lanacion.com.ar/arc/outboundfeeds/rss/",
  "https://www.clarin.com/rss/lo-ultimo/",
  "https://www.america-retail.com/feed/",
  "https://www.lavanguardia.com/rss/salud.xml",
  "https://www.20minutos.es/rss/salud/",
];

const AUTO_INTERVAL = 5000;

let allItems = [];
let currentSlide = 0;
let autoTimer = null;
let total = 0;

function sourceName(url) {
  try { return new URL(url).hostname.replace('www.','').split('.')[0].toUpperCase(); }
  catch(e) { return ''; }
}

function getImage(item) {
  if (item.thumbnail && item.thumbnail.startsWith('http')) return item.thumbnail;
  if (item.enclosure && item.enclosure.link && item.enclosure.link.startsWith('http')) return item.enclosure.link;
  if (item.description) {
    const m = item.description.match(/src=["']([^"']+\.(jpg|jpeg|png|webp)[^"']*)/i);
    if (m) return m[1];
  }
  return null;
}

async function loadAll() {
  let items = [];
  for (const url of RSS_URLS) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=50`);
      const data = await res.json();
      if (data.status === 'ok' && data.items && data.items.length) {
        items = items.concat(data.items.map(i => ({ ...i, _srcUrl: url })));
      }
    } catch(e) {}
  }
  allItems = items.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  if (!allItems.length) return;
  renderCarousel(allItems);
  renderGrid(allItems);
}

function renderCarousel(items) {
  const track = document.getElementById('carousel-track');
  total = items.length;

  track.innerHTML = '';
  document.getElementById('main-loading').style.display = 'none';
  track.style.display = 'flex';
  document.getElementById('prev-btn').style.display = 'flex';
  document.getElementById('next-btn').style.display = 'flex';
  document.getElementById('counter').style.display = 'block';

  items.forEach(item => {
    const img = getImage(item);
    const src = sourceName(item._srcUrl);
    const a = document.createElement('a');
    a.className = 'nm-slide';
    a.href = item.link;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    const imgHtml = img
      ? `<img src="${img}" alt="" onerror="this.outerHTML='<div class=nm-img-placeholder></div>'">`
      : `<div class="nm-img-placeholder"></div>`;
    a.innerHTML = `${imgHtml}<div class="nm-overlay"><div class="nm-source">${src}</div><div class="nm-title">${item.title}</div></div>`;
    track.appendChild(a);
  });

  goTo(0);
  startAuto();
}

function renderGrid(items) {
  const grid = document.getElementById('news-grid');
  grid.innerHTML = '';
  items.forEach(item => {
    const a = document.createElement('a');
    a.className = 'nm-card';
    a.href = item.link;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `<div class="nm-card-source">${sourceName(item._srcUrl)}</div><div class="nm-card-title">${item.title}</div>`;
    grid.appendChild(a);
  });
}

function goTo(idx) {
  currentSlide = idx;
  document.getElementById('carousel-track').style.transform = `translateX(${-idx * 100}%)`;
  document.getElementById('counter').textContent = `${idx + 1} / ${total}`;
  const fill = document.getElementById('progress-fill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  requestAnimationFrame(() => {
    fill.style.transition = `width ${AUTO_INTERVAL}ms linear`;
    fill.style.width = '100%';
  });
}

function startAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => goTo((currentSlide + 1) % total), AUTO_INTERVAL);
}

document.getElementById('prev-btn').addEventListener('click', () => { goTo((currentSlide - 1 + total) % total); clearInterval(autoTimer); startAuto(); });
document.getElementById('next-btn').addEventListener('click', () => { goTo((currentSlide + 1) % total); clearInterval(autoTimer); startAuto(); });
document.getElementById('carousel-area').addEventListener('mouseenter', () => clearInterval(autoTimer));
document.getElementById('carousel-area').addEventListener('mouseleave', () => startAuto());

loadAll();
setInterval(loadAll, 10 * 60 * 1000);
</script>

</body>
</html>
