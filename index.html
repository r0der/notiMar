<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#fff; }

#notimar-root {
  width: 65%;
  min-width: 320px;
  max-width: 900px;
}

/* --- resto igual --- */
#carousel-area { position: relative; overflow: hidden; background:#1a2a4a; height:200px;}
#carousel-track { display:flex; height:100%; transition:transform .45s ease;}
.nm-slide { min-width:100%; height:200px; position:relative; }
.nm-slide img { width:100%; height:100%; object-fit:cover; }
.nm-img-placeholder { width:100%; height:100%; background:#2c3e6b;}
.nm-overlay { position:absolute; bottom:0; width:100%; background:linear-gradient(transparent,rgba(0,0,0,.9)); padding:10px; color:#fff;}
</style>
</head>

<body>
<div id="notimar-root">

<div id="carousel-area">
  <div id="carousel-track"></div>
</div>

<div id="news-grid"></div>

</div>

<script>
const FEEDS = [
  { url:"https://feeds.bbci.co.uk/mundo/rss.xml", name:"BBC" },
  { url:"https://www.lanacion.com.ar/arc/outboundfeeds/rss/", name:"La Nación" },
  { url:"https://www.clarin.com/rss/lo-ultimo/", name:"Clarín" },
  { url:"https://www.lavanguardia.com/rss/salud.xml", name:"La Vanguardia" },
  { url:"https://www.20minutos.es/rss/salud/", name:"20 Minutos" },
];

let allItems = [];
let current = 0;
let timer;

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej("timeout"),ms))
  ]);
}

async function viaRss2json(url){
  const r = await fetch("https://api.rss2json.com/v1/api.json?count=50&rss_url="+encodeURIComponent(url));
  const d = await r.json();
  if(d.status!=="ok") throw "error";
  return d.items;
}

async function viaAllOrigins(url){
  const r = await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url));
  const d = await r.json();
  return parseRSS(d.contents);
}

async function viaCors(url){
  const r = await fetch("https://corsproxy.io/?"+encodeURIComponent(url));
  return parseRSS(await r.text());
}

function parseRSS(xml){
  const doc = new DOMParser().parseFromString(xml,"text/xml");
  return [...doc.querySelectorAll("item")].map(el=>({
    title: el.querySelector("title")?.textContent || "",
    link: el.querySelector("link")?.textContent || "",
    description: el.querySelector("description")?.textContent || "",
    thumbnail: el.querySelector("media\\:content, enclosure")?.getAttribute("url") || ""
  }));
}

async function loadFeed(feed){
  for(const fn of [viaRss2json, viaAllOrigins, viaCors]){
    try{
      const items = await withTimeout(fn(feed.url),7000);
      if(items?.length) return items.map(i=>({...i,_name:feed.name}));
    }catch(e){}
  }
  return [];
}

async function loadAll(){
  allItems = [];

  const results = await Promise.allSettled(
    FEEDS.map(f=>loadFeed(f))
  );

  results.forEach(r=>{
    if(r.status==="fulfilled"){
      allItems.push(...r.value);
    }
  });

  allItems = shuffle(allItems);

  render();
}

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function getImage(i){
  if(i.thumbnail) return i.thumbnail;
  const m = (i.description||"").match(/src="([^"]+)"/);
  return m ? m[1] : null;
}

function render(){
  const track = document.getElementById("carousel-track");
  track.innerHTML = "";

  allItems.forEach(item=>{
    const img = getImage(item);

    const slide = document.createElement("div");
    slide.className="nm-slide";

    slide.innerHTML = `
      ${img ? `<img src="${img}">` : `<div class="nm-img-placeholder"></div>`}
      <div class="nm-overlay">
        <div>${item._name}</div>
        <div>${item.title}</div>
      </div>
    `;

    track.appendChild(slide);
  });

  startAuto();
}

function goTo(i){
  if(!allItems.length) return;
  current = (i + allItems.length) % allItems.length;

  document.getElementById("carousel-track").style.transform =
    `translateX(-${current*100}%)`;
}

function startAuto(){
  clearInterval(timer);
  timer = setInterval(()=>goTo(current+1),5000);
}

/* FIX imágenes rotas */
document.addEventListener("error",e=>{
  if(e.target.tagName==="IMG"){
    e.target.style.display="none";
  }
},true);

loadAll();
</script>

</body>
</html>
